<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient: Obsidian to Midnight -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Accent Gradient: Violet to Indigo -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <!-- Outer Glow for the bolt -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#8B5CF6" flood-opacity="0.6" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle inner drop shadow for depth -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2" />
      <feGaussianBlur stdDeviation="1.5" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood flood-color="white" flood-opacity="0.5" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>
  </defs>

  <!-- Premium Dark Rounded Rect with Subtle Border -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bgGrad)" stroke="rgba(99, 102, 241, 0.4)" stroke-width="2" />
  <rect x="6" y="6" width="88" height="88" rx="23.5" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />

  <!-- Bold Abstract Lightning Bolt / Dynamic M -->
  <!-- Scaled up from Lucide Zap for 100x100 canvas -->
  <path d="M30 54 L60 20 L50 48 L70 48 L40 82 L50 54 Z" 
        fill="url(#accentGrad)" 
        filter="url(#glow) url(#innerShadow)" 
        transform="translate(2, -2)" />
</svg>
