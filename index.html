<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum - Habit &amp; Goal Tracker</title>
  <meta name="description" content="Momentum — track habits, crush goals, and visualize your progress every day." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <!--
    Anti-flash theme script: runs synchronously BEFORE first paint.
    Reads localStorage preference OR falls back to OS preference.
    Sets 'dark' class on <html> immediately so Tailwind dark: variants apply.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('momentum-theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Default to dark if no preference saved
        var theme = saved ? saved : (systemDark ? 'dark' : 'dark');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        // If localStorage is blocked, default to dark
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="antialiased font-sans flex flex-col min-h-screen">
  <div id="root" class="flex-1 flex flex-col"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
